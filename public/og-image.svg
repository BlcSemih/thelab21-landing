<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="500" r="200" fill="#6366f1" fill-opacity="0.1"/>
  <circle cx="1050" cy="130" r="150" fill="#a855f7" fill-opacity="0.1"/>
  <circle cx="900" cy="500" r="100" fill="#ec4899" fill-opacity="0.08"/>

  <!-- Logo box -->
  <rect x="100" y="200" width="90" height="90" rx="20" fill="url(#accent)"/>
  <text x="145" y="262" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">21</text>

  <!-- Brand name -->
  <text x="210" y="265" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white">
    the<tspan fill="url(#textGrad)">Lab21</tspan>
  </text>

  <!-- Tagline -->
  <text x="100" y="340" font-family="Arial, sans-serif" font-size="36" fill="#9ca3af">
    Digitales Studio aus Stuttgart
  </text>

  <!-- Description -->
  <text x="100" y="420" font-family="Arial, sans-serif" font-size="28" fill="#6b7280">
    Wir entwickeln innovative Software-Produkte
  </text>

  <!-- Bottom accent line -->
  <rect x="100" y="550" width="200" height="4" rx="2" fill="url(#accent)"/>
</svg>
